name: smoketest

on:
  push:
    # Run on source, build, and test changes. Docs-only changes skip this
    # workflow since they don't affect runtime behavior.
    paths:
      - 'pynng/**'
      - 'build_pynng.py'
      - 'preprocess.py'
      - 'test/**'
      - 'pyproject.toml'
      - 'CMakeLists.txt'
      - 'stubs/**'
      - '.github/workflows/smoketest.yml'
  pull_request:
    paths:
      - 'pynng/**'
      - 'build_pynng.py'
      - 'preprocess.py'
      - 'test/**'
      - 'pyproject.toml'
      - 'CMakeLists.txt'
      - 'stubs/**'
      - '.github/workflows/smoketest.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Build a single wheel using stable ABI (cp310), installable on all Python 3.10+
  build:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          architecture: x64
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
      - run: sudo apt update
      - run: sudo apt install -y ninja-build libclang-dev
      - name: Build wheel
        run: uv build --wheel -o dist/
      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: smoketest-wheel
          path: dist/*.whl

  # Test the pre-built wheel across Python versions
  test:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.10', '3.11', '3.12', '3.13', '3.14' ]
    steps:
      - uses: actions/checkout@v6
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
      - name: Download wheel
        uses: actions/download-artifact@v8
        with:
          name: smoketest-wheel
          path: dist/
      - name: Install wheel and test deps
        run: uv pip install --system dist/*.whl pytest pytest-asyncio pytest-trio trio
      - name: Run tests
        run: pytest -v test
