name: smoketest

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.10', '3.11', '3.12', '3.13', '3.14' ]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
      - name: Setup uv
        uses: astral-sh/setup-uv@v4
      - run: sudo apt update
      - run: sudo apt install -y ninja-build libclang-dev
      - run: uv pip install --system -v -e '.[dev]'
      - run: uv run --no-project pytest -v test

  tls-engines:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tls-engine: [ wolf, none ]
      fail-fast: false
    name: "TLS engine: ${{ matrix.tls-engine }}"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: x64
      - name: Setup uv
        uses: astral-sh/setup-uv@v4
      - run: sudo apt update
      - run: sudo apt install -y ninja-build libclang-dev
      - name: "Build with PYNNG_TLS_ENGINE=${{ matrix.tls-engine }}"
        run: >
          uv pip install --system -v -e '.[dev]'
          -C cmake.args="-DPYNNG_TLS_ENGINE=${{ matrix.tls-engine }}"
      - name: Run TLS tests
        run: uv run --no-project pytest -v -m requires_tls test
