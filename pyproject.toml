[project]
name = "pynng"
authors = [{ name = "Cody Piersall", email = "cody.piersall@gmail.com" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: AsyncIO",
    "Framework :: Trio",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.6",
    "Programming Language :: Python :: 3.7",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Topic :: Software Development :: Libraries",
    "Topic :: System :: Networking",
]
dependencies = ["cffi", "sniffio"]
description = "Networking made simply using nng"
license = { text = "MIT" }
dynamic = ["version"]
keywords = [
    "networking",
    "nng",
    "nanomsg",
    "zmq",
    "messaging",
    "message",
    "trio",
    "asyncio",
]
readme = "README.md"
requires-python = ">=3.6"

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "pytest-trio", "trio"]
docs = ["sphinx", "sphinx-rtd-theme", "sphinxcontrib-trio"]

[project.urls]
Homepage = "https://github.com/codypiersall/pynng"
Source = "https://github.com/codypiersall/pynng"
Documentation = "https://pynng.readthedocs.io/en/latest/"

[build-system]
build-backend = "scikit_build_core.build"
requires = [
    "scikit-build-core>=0.8.0",
    "cffi",
    "cffi_buildtool",
    "setuptools-scm",
]

[tool.scikit-build]
wheel.packages = ["pynng"]
wheel.py-api = "cp36"
cmake.version = ">=3.18"
cmake.verbose = true
minimum-version = "0.8.0"
build-dir = "./build/{cache_tag}"
cmake.define = { "CMAKE_POSITION_INDEPENDENT_CODE" = "ON" }
# cmake.build-type = "Release"
cmake.build-type = "Debug" # Uncomment for a debug build

# sdist.include = [
#     "pynng/**/",       # Python source files
#     "pynng/**/*.so",       # Linux/Unix extension modules
#     "pynng/**/*.pyd",      # Windows extension modules
# ]

[tool.setuptools_scm]
write_to = "pynng/_version.py"

[tool.cibuildwheel]
test-requires = ["pytest", "pytest-asyncio", "pytest-trio", "trio"]
test-command = "pytest {project}/test"

# wheels aren't built correctly for Python 3.6; seems like setuptools doesn't like
# pyproject.toml for that old Python.
# pypy3.9 fails on Windows for some reason
skip = "cp36-* pp39-win_amd64 pp310-win_amd64"

build-verbosity = 1

[tool.cibuildwheel.windows]
# Windows builds fail because they try to use the same directory for different
# architectures, and that's no good.
before-build = "bash .github/rmstuff.sh"

[tool.cibuildwheel.macos]
# Specify universal2 building for macOS
archs = ["universal2"]
environment = { CMAKE_OSX_ARCHITECTURES = "x86_64;arm64" }

[tool.pytest.ini_options]
addopts = "--capture=no --verbose"
testpaths = "test/**/*.py"
